services:
  - type: web
    name: futbolstats-pro
    runtime: node
    repo: https://github.com/Tez-Tez-Tez/act1-corte3
    plan: free
    branch: master
    region: oregon
    buildCommand: npm ci --only=production
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: futbolstats-pro-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: futbolstats-pro-db
    plan: free
    region: oregon
    databaseName: futbolstats_pro
    user: futbolstats
