services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: futbolstats
      POSTGRES_PASSWORD: futbolstats_secret
      POSTGRES_DB: futbolstats_pro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futbolstats -d futbolstats_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://futbolstats:futbolstats_secret@db:5432/futbolstats_pro
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
